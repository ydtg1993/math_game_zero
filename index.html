<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍎 数学四则大冒险 · 搞笑奖励</title>
    <style>
        :root {
            --bg: #fff8f0;
            --card: #ffffff;
            --pink: #ff6b8a;
            --blue: #5b9bd5;
            --green: #4caf84;
            --yellow: #ffb347;
            --purple: #9b7fd4;
            --orange: #ff7b42;
            --text: #4a3728;
            --light-text: #7a6b5d;
            --shadow: 0 6px 24px rgba(0,0,0,0.08);
            --radius: 24px;
            --radius-sm: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;
            background: linear-gradient(180deg, #fff3e8 0%, #fde9da 30%, #fef5ee 60%, #fff8f3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            position: relative;
        }
        body::before, body::after {
            content:''; position:fixed; border-radius:50%; pointer-events:none; z-index:0;
        }
        body::before { top:-80px; right:-60px; width:200px; height:200px; background:radial-gradient(circle, rgba(255,179,71,0.18) 0%, transparent 70%); animation: floatBg 8s infinite; }
        body::after { bottom:-50px; left:-40px; width:160px; height:160px; background:radial-gradient(circle, rgba(255,107,138,0.14) 0%, transparent 70%); animation: floatBg 10s infinite reverse; }
        @keyframes floatBg {
            0%,100%{ transform:translate(0,0) scale(1); }
            30%{ transform:translate(15px,-20px) scale(1.1); }
            60%{ transform:translate(-10px,10px) scale(0.95); }
        }
        .app-container { width:100%; max-width:550px; position:relative; z-index:1; display:flex; flex-direction:column; gap:12px; }
        .header {
            background: var(--card); border-radius: var(--radius); padding:14px 18px;
            box-shadow: var(--shadow); display:flex; align-items:center; gap:10px; flex-wrap:wrap;
        }
        .mascot { font-size:42px; animation: bounceMascot 2s infinite; cursor:pointer; transition:0.2s; line-height:1; }
        .mascot:active { transform:scale(1.2); }
        @keyframes bounceMascot {
            0%,100%{ transform:translateY(0); } 25%{ transform:translateY(-12px); } 50%{ transform:translateY(0); } 75%{ transform:translateY(-5px); }
        }
        .title-group { flex:1; }
        .title { font-size:1.3rem; font-weight:700; color:var(--text); }
        .subtitle { font-size:0.75rem; color:var(--light-text); }
        .badges { display:flex; align-items:center; gap:8px; }
        .star-badge { display:flex; align-items:center; gap:4px; background:#fffbe6; border:2px solid #ffe082; border-radius:30px; padding:6px 12px; font-weight:700; color:#e6a700; }
        .music-btn { width:40px; height:40px; border-radius:50%; background:#f0e6f7; border:2px solid #cfb5e8; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .music-btn.off { opacity:0.7; background:#f5f0f5; }
        .level-row {
            display:flex; gap:6px; overflow-x:auto; padding:4px 0; scrollbar-width:none;
        }
        .level-row::-webkit-scrollbar { display:none; }
        .level-btn {
            flex:0 0 auto; padding:8px 14px; border-radius:30px; border:2px solid #e8ddd0;
            background:#fff; font-weight:700; font-size:0.8rem; cursor:pointer; white-space:nowrap;
            transition:0.2s; color:var(--light-text);
        }
        .level-btn.active { border-color:var(--purple); background:#f3edff; color:#6c4aa0; }
        .tabs { display:flex; gap:8px; flex-wrap:wrap; }
        .tab-btn {
            flex:1; min-width:70px; padding:13px 10px; border-radius:var(--radius-sm); border:3px solid transparent;
            font-weight:700; cursor:pointer; background:var(--card); color:var(--light-text);
            box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center; gap:4px; font-size:0.9rem;
        }
        .tab-btn.active { border-color:var(--pink); color:var(--pink); background:#fff5f7; }
        .main-card {
            background:var(--card); border-radius:var(--radius); padding:18px;
            box-shadow:var(--shadow); display:flex; flex-direction:column; gap:12px; transition: all 0.3s;
        }
        .scene-area {
            background:linear-gradient(135deg,#e2f0cb,#c8e6c9); border-radius:var(--radius-sm);
            min-height:100px; display:flex; flex-wrap:wrap; align-items:center; justify-content:center;
            gap:6px; padding:16px; border:3px dashed #a5d6a7; position:relative; overflow:hidden;
        }
        .scene-area.counting-scene { background: linear-gradient(135deg, #fff9c4, #fff176); border-color: #ffb74d; }
        .fruit-display {
            background:linear-gradient(135deg,#fefcf7,#fdf5ea); border-radius:var(--radius-sm);
            min-height:90px; display:flex; flex-wrap:wrap; align-items:center; justify-content:center;
            gap:6px; padding:12px; border:3px dashed #f0dcc8; transition:0.3s;
        }
        .fruit-display.demo-active { border-color:#ffb347; border-style:solid; }
        .animal-item, .fruit-item {
            font-size:2.2rem; transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            position: relative; display: inline-block;
        }
        .animal-item.walk-in { animation: walkInRight 0.7s ease-out forwards; }
        .animal-item.walk-out { animation: walkOutLeft 0.7s ease-in forwards; }
        .fruit-item.bounce-in { animation: fruitBounce 0.5s cubic-bezier(0.34,1.56,0.64,1); }
        .fruit-item.pop-out { animation: fruitPop 0.4s ease-in forwards; }
        @keyframes walkInRight {
            0% { transform: translateX(150px) scale(0.5); opacity:0; }
            70% { transform: translateX(-10px) scale(1.1); opacity:1; }
            100% { transform: translateX(0) scale(1); opacity:1; }
        }
        @keyframes walkOutLeft {
            0% { transform: translateX(0) scale(1); opacity:1; }
            100% { transform: translateX(-150px) scale(0.5); opacity:0; }
        }
        @keyframes fruitBounce {
            0%{ opacity:0; transform:translateY(-50px) scale(0.3) rotate(-20deg); }
            60%{ opacity:1; transform:translateY(5px) scale(1.1) rotate(5deg); }
            100%{ transform:translateY(0) scale(1) rotate(0); }
        }
        @keyframes fruitPop {
            0%{ transform:scale(1); opacity:1; } 100%{ transform:scale(0) rotate(30deg); opacity:0; }
        }
        .equation {
            text-align:center; font-size:2rem; font-weight:800; color:var(--text); min-height:48px;
            display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap;
        }
        .question-mark {
            display:inline-block; width:48px; height:48px; line-height:48px; background:#fff3cd;
            border:3px dashed #ffb347; border-radius:14px; color:#e6a700; font-weight:800;
        }
        .btn {
            padding:14px 20px; border-radius:50px; font-weight:700; border:none; cursor:pointer;
            transition:0.2s; display:flex; align-items:center; justify-content:center; gap:6px;
            -webkit-tap-highlight-color:transparent;
        }
        .btn:active { transform:scale(0.94); }
        .btn-demo { background:var(--pink); color:#fff; font-size:1.05rem; width:100%; }
        .btn-new-quiz { background:var(--blue); color:#fff; font-size:1.05rem; width:100%; }
        .options-grid {
            display:grid; gap:8px; justify-content:center;
        }
        .btn-option {
            background:#fff; border:3px solid #e8ddd0; font-size:1.3rem; font-weight:800;
            padding:14px; border-radius:18px; color:var(--text); text-align:center;
            transition: all 0.2s;
        }
        .btn-option.correct { background:#e8f8ef; border-color:var(--green); color:#2d7d4f; pointer-events:none; }
        .btn-option.wrong { background:#fff0f0; border-color:#ff5252; color:#c0392b; animation:shake 0.5s; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(4px);} }
        .feedback { text-align:center; font-weight:700; font-size:1rem; min-height:28px; color: var(--text); }
        .feedback.celebrate { color: var(--green); font-size:1.2rem; animation: celebrateBounce 0.6s; }
        @keyframes celebrateBounce {
            0%{ transform:scale(0.5); opacity:0; } 60%{ transform:scale(1.2); } 100%{ transform:scale(1); opacity:1; }
        }
        .confetti-container { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; }
        .confetti-particle {
            position:absolute; font-size:1.4rem; animation: confettiFall 1.5s ease-out forwards;
        }
        @keyframes confettiFall {
            0%{ transform:translateY(-50px) rotate(0); opacity:1; }
            100%{ transform:translateY(105vh) rotate(720deg); opacity:0; }
        }
        .reward-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            z-index: 1000; animation: fadeIn 0.3s;
        }
        .reward-card {
            background: white; border-radius: 30px; padding: 25px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: rewardPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
            max-width: 280px;
        }
        @keyframes rewardPop {
            0%{ transform:scale(0) rotate(-15deg); opacity:0; }
            80%{ transform:scale(1.1) rotate(2deg); }
            100%{ transform:scale(1) rotate(0); opacity:1; }
        }
        @keyframes fadeIn { from{ opacity:0; } to{ opacity:1; } }
        @media (max-width:400px) {
            .fruit-item, .animal-item { font-size:1.6rem; }
            .equation { font-size:1.5rem; }
            .btn-option { font-size:1rem; padding:10px; }
        }
    </style>
</head>
<body>
<div class="confetti-container" id="confettiContainer"></div>
<div class="app-container">
    <div class="header">
        <span class="mascot" id="mascotEmoji" title="点我！">🐻</span>
        <div class="title-group">
            <div class="title">🍎 数学四则大冒险</div>
            <div class="subtitle">搞笑奖励等着你！</div>
        </div>
        <div class="badges">
            <button class="music-btn" id="musicToggle">🎶</button>
            <div class="star-badge" id="starBadge"><span>⭐</span><span id="starCount">0</span>分</div>
        </div>
    </div>
    <div class="level-row" id="levelRow">
        <button class="level-btn active" data-level="0">🌟启蒙</button>
        <button class="level-btn" data-level="1">🌿初级</button>
        <button class="level-btn" data-level="2">🌳高级</button>
        <button class="level-btn" data-level="3">🍎乘法</button>
        <button class="level-btn" data-level="4">🥝乘除</button>
        <button class="level-btn" data-level="5">🧠四则</button>
    </div>
    <div class="tabs">
        <button class="tab-btn active" id="tabDemo">🎬 看演示</button>
        <button class="tab-btn" id="tabQuiz">🎮 来答题</button>
        <button class="tab-btn" id="tabCounting">🐾 趣味数数</button>
    </div>
    <div class="main-card" id="mainCard">
        <div class="scene-area counting-scene" id="sceneArea" style="display:none;"></div>
        <div class="fruit-display demo-active" id="fruitDisplay">👆 点击按钮开始</div>
        <div class="equation" id="equationDisplay">准备开始 🎈</div>
        <button class="btn btn-demo" id="btnDemo">▶️ 看演示动画</button>
        <div class="options-grid" id="optionsGrid" style="display:none;"></div>
        <button class="btn btn-new-quiz" id="btnNewQuiz" style="display:none;">🎲 出新题目</button>
        <div class="feedback" id="feedbackMsg"></div>
    </div>
</div>
<script type="module" src="index.js"></script>
</body>
</html>
